<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kapitano — Maquettes</title>

  <link rel="stylesheet" href="./src/style.css">

  <!-- Google Fonts: Material Symbols Outlined uniquement (Inter est local) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <!-- React + Babel (in-browser JSX transpilation) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data must load first (plain JS, no JSX) -->
  <script src="./src/data.js"></script>

  <!-- JSX components — loaded in dependency order -->
  <script type="text/babel" src="./src/components.jsx" data-presets="react"></script>
  <script type="text/babel" src="./src/shell.jsx"      data-presets="react"></script>
  <script type="text/babel" src="./src/screens-core.jsx"         data-presets="react"></script>
  <script type="text/babel" src="./src/screens-mobile-liens.jsx" data-presets="react"></script>
  <script type="text/babel" src="./src/screens-referentiel.jsx"  data-presets="react"></script>
  <script type="text/babel" src="./src/screens-rest.jsx"         data-presets="react"></script>
  <script type="text/babel" src="./src/screens-voix.jsx"         data-presets="react"></script>
  <script type="text/babel" src="./src/app.jsx"        data-presets="react"></script>
</body>
</html>
